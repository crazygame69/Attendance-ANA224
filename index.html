<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANA224 — ระบบเช็คชื่อล็อกพิกัด (ระบบส่งลิงก์)</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --mint: #10b981; --danger: #ef4444; --sky: #3b82f6; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
  .container { max-width: 500px; margin: 0 auto; }
  .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #475569; box-sizing: border-box; font-size: 16px; }
  input { background: #334155; color: white; }
  button { background: var(--sky); color: white; font-weight: bold; cursor: pointer; border: none; }
  .btn-disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
  .status { font-weight: bold; padding: 10px; border-radius: 6px; text-align: center; margin-top: 10px; }
  .inside { background: rgba(16,185,129,0.2); color: var(--mint); border: 1px solid var(--mint); }
  .outside { background: rgba(239,68,68,0.2); color: var(--danger); border: 1px solid var(--danger); }
</style>
</head>
<body>

<div class="container">
  
  <div id="teacher-panel" class="card">
    <h2>🔐 หลังบ้านอาจารย์ (ตึก 4)</h2>
    <p style="font-size:13px; color:#94a3b8;">ใส่พิกัดตึก 7 แล้วกดสร้างลิงก์ เพื่อส่งให้เด็กใน LINE</p>
    
    <label>กรอก ละติจูด ตึก 7</label>
    <input type="number" id="t-lat" step="0.000001" placeholder="เช่น 13.968250">
    <label>กรอก ลองจิจูด ตึก 7</label>
    <input type="number" id="t-lng" step="0.000001" placeholder="เช่น 100.589140">
    
    <button style="background:var(--mint);" onclick="generateLink()">🔗 1. สร้างลิงก์เช็คชื่อส่งให้เด็ก</button>
    
    <div id="link-result" style="margin-top:15px; display:none;">
      <p style="font-size:12px; color:var(--mint);">ส่งลิงก์ด้านล่างนี้ให้เด็กกดเรียนในตึก 7:</p>
      <input type="text" id="generated-url" readonly onclick="this.select()">
    </div>
  </div>

  <div id="student-panel" class="card" style="border-top: 4px solid var(--sky); margin-top:30px;">
    <h2>🎓 ฝั่งนักศึกษา (เปิดลิงก์ที่อาจารย์ส่งมา)</h2>
    <div id="target-ui" style="font-size:14px; color:#94a3b8; margin-bottom:10px;">
      พิกัดเป้าหมายตึก 7: รอรับลิงก์จากอาจารย์...
    </div>
    <div id="geo-status" class="status outside">❌ ยังไม่มีการตั้งค่าพิกัดเข้ามา</div>
    
    <input type="text" id="stu-id" placeholder="รหัสนักศึกษา 10 หลัก">
    <button id="btn-submit" class="btn-disabled" disabled onclick="alert('เช็คชื่อสำเร็จ!')">📌 ยืนยันพิกัดและเช็คชื่อ</button>
  </div>

</div>

<script>
let targetLat = null, targetLng = null, targetRad = 100;

// ตอนโหลดหน้าจอ: ตรวจสอบว่าลิงก์มีพิกัดพ่วงมาไหม
window.onload = function() {
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('lat') && urlParams.has('lng')) {
    targetLat = parseFloat(urlParams.get('lat'));
    targetLng = parseFloat(urlParams.get('lng'));
    
    document.getElementById("target-ui").innerHTML = `📍 พิกัดเป้าหมายตึก 7 จากอาจารย์:<br>Lat: ${targetLat}, Lng: ${targetLng}`;
    document.getElementById("teacher-panel").style.display = "none"; // ซ่อนเมนูอาจารย์ถ้าเด็กเปิด
    
    startGPS(); // เริ่มจับพิกัดเด็ก
  }
};

// อาจารย์กดสร้างลิงก์ส่งให้เด็ก
function generateLink() {
  const lat = document.getElementById("t-lat").value.trim();
  const lng = document.getElementById("t-lng").value.trim();
  if(!lat || !lng) { alert("กรุณากรอกพิกัดตึก 7 ก่อนครับ"); return; }
  
  // สร้าง URL แบบพ่วงพิกัดไปในลิงก์
  const currentUrl = window.location.href.split('?')[0];
  const newUrl = `${currentUrl}?lat=${lat}&lng=${lng}`;
  
  document.getElementById("generated-url").value = newUrl;
  document.getElementById("link-result").style.display = "block";
}

// ระบบดาวเทียมบนมือถือเด็ก
function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById("geo-status").innerText = "มือถือไม่รองรับ GPS";
    return;
  }
  document.getElementById("geo-status").innerText = "📡 กำลังคำนวณระยะห่างดาวเทียม...";
  
  navigator.geolocation.watchPosition((pos) => {
    const userLat = pos.coords.latitude;
    const userLng = pos.coords.longitude;
    
    // คำนวватьระยะห่างระหว่างเด็ก กับ พิกัดที่ฝังมาในลิงก์
    const R = 6371e3;
    const dLat = (targetLat - userLat) * Math.PI / 180;
    const dLng = (targetLng - userLng) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(userLat * Math.PI / 180) * Math.cos(targetLat * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    const distance = R * c;

    const statusEl = document.getElementById("geo-status");
    const btn = document.getElementById("btn-submit");

    if (distance <= targetRad) {
      statusEl.className = "status inside";
      statusEl.innerText = `✅ คุณถึงตึก 7 แล้ว (ห่าง ${Math.round(distance)} เมตร)`;
      btn.disabled = false; btn.className = "";
    } else {
      statusEl.className = "status outside";
      statusEl.innerText = `❌ คุณอยู่ห่างเกินไป (${Math.round(distance)} เมตร) ล็อกปุ่ม!`;
      btn.disabled = true; btn.className = "btn-disabled";
    }
  }, (err) => {
    document.getElementById("geo-status").innerText = "❌ มือถือปฏิเสธการเข้าถึง GPS";
  }, { enableHighAccuracy: true });
}
</script>
</body>
</html>
